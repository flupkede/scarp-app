name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent simultaneous deploys; cancel any in-progress run for the same branch.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  # ── Job 1: Build SvelteKit static site → Azure Static Web App ───────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    name: Frontend → Azure SWA
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend
        env:
          PUBLIC_API_URL: ""  # SWA proxies /api/* to the linked backend
        run: pnpm build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: build
          skip_app_build: true   # use pre-built pnpm output; skip Oryx npm rebuild
          skip_api_build: true

  # ── Job 2: Deploy FastAPI backend → Azure App Service ────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    name: Backend → Azure App Service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Package backend for deployment
        run: |
          mkdir -p deploy_pkg

          # Export deps without the editable-install line (-e .) so Oryx
          # can run plain pip install without needing the source tree first.
          cd backend && uv export --no-hashes --format requirements-txt \
            | grep -v "^-e " > ../deploy_pkg/requirements.txt && cd ..

          # Copy the scarp package to the deploy root so gunicorn can find
          # scarp.api.main:app without any PYTHONPATH tricks.
          cp -r backend/src/scarp deploy_pkg/scarp

          # Include processed GeoJSON data — backend reads these at runtime.
          mkdir -p deploy_pkg/data
          cp -r data/processed deploy_pkg/data/

          cd deploy_pkg && zip -r ../backend-deploy.zip . && cd ..
          echo "Package size: $(du -sh backend-deploy.zip)"

      - name: Deploy to App Service
        run: |
          az webapp deploy \
            --resource-group scarp \
            --name scarp-api \
            --src-path backend-deploy.zip \
            --type zip \
            --async false
